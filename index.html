<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Recorder + Webhook</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

video {
  width:300px;
  margin:10px;
  border-radius:10px;
}

button {
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>🎥 تسجيل الشاشة + الكاميرا</h2>

<button onclick="start()">بدء</button>
<button onclick="stop()">إيقاف</button>

<br>

<video id="screen" autoplay></video>
<video id="face" autoplay muted></video>

<script>
let screenStream, faceStream, recorder;
let chunks = [];
let lastBlob = null;

const screenVideo = document.getElementById("screen");
const faceVideo = document.getElementById("face");

async function start() {

  const ok = confirm("هل توافق على تسجيل الشاشة والكاميرا؟");
  if (!ok) return;

  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    faceStream = await navigator.mediaDevices.getUserMedia({ video: true });

    screenVideo.srcObject = screenStream;
    faceVideo.srcObject = faceStream;

  } catch (err) {
    alert("فشل التشغيل ❌: " + err.name);
    console.log(err);
    return;
  }

  const mixedStream = new MediaStream([
    ...screenStream.getVideoTracks(),
    ...faceStream.getVideoTracks()
  ]);

  recorder = new MediaRecorder(mixedStream);
  chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {

    lastBlob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(lastBlob);

    // 💾 حفظ داخل الجهاز
    const a = document.createElement("a");
    a.href = url;
    a.download = "record.webm";
    a.click();

    alert("تم حفظ الفيديو ✅");

    // 📤 زر إرسال Webhook
    const btn = document.createElement("button");
    btn.innerText = "إرسال إلى السيرفر";
    document.body.appendChild(btn);

    btn.onclick = async () => {

      const confirmSend = confirm("هل تريد إرسال الفيديو إلى السيرفر؟");
      if (!confirmSend) return;

      const webhookURL = "https://discord.com/api/webhooks/1484152062626369659/sMpPjPuKQ8nZoFWqI5Id97toLaiY_hyTNR_3kgpNJdu0JvAPim36IdHWgNV7WwIFKYJ6"; // رابط Discord Webhook

      try {
        const formData = new FormData();
        formData.append("file", lastBlob, "record.webm");

        await fetch(webhookURL, {
          method: "POST",
          body: formData
        });

        alert("تم الإرسال بنجاح ✅");
      } catch (err) {
        alert("فشل الإرسال ❌");
        console.log(err);
      }
    };
  };

  recorder.start();
}

function stop() {
  recorder.stop();

  screenStream?.getTracks().forEach(t => t.stop());
  faceStream?.getTracks().forEach(t => t.stop());
}
</script>

</body>
</html>
