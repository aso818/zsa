<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الشاشة / الكاميرا</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h1 { margin-bottom: 20px; }

button {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

#start { background: #00c853; }
#stop { background: #ff5252; }

video {
  max-width: 90%;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>🎥 تسجيل الشاشة / الكاميرا</h1>

<button id="start">بدء</button>
<button id="stop" disabled>إيقاف</button>

<video id="video" controls autoplay playsinline></video>

<script>
// 🔗 حط رابط الويبهوك هنا
const webhookURL = "https://discord.com/api/webhooks/1484152062626369659/sMpPjPuKQ8nZoFWqI5Id97toLaiY_hyTNR_3kgpNJdu0JvAPim36IdHWgNV7WwIFKYJ6";

let recorder, stream, chunks = [];

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const video = document.getElementById("video");

startBtn.onclick = async () => {
  startBtn.disabled = true;
  stopBtn.disabled = false;

  try {
    // كمبيوتر: تسجيل شاشة
    if (navigator.mediaDevices.getDisplayMedia) {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true
      });
    } else {
      throw "no screen";
    }
  } catch {
    // جوال: كاميرا
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
      alert("📱 تم التحويل للكاميرا");
    } catch (err) {
      alert("فشل التشغيل ❌");
      startBtn.disabled = false;
      stopBtn.disabled = true;
      return;
    }
  }

  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    video.src = url;

    // زر تحميل
    const downloadBtn = document.createElement("a");
    downloadBtn.href = url;
    downloadBtn.download = "record.webm";
    downloadBtn.innerText = "⬇️ تحميل الفيديو";
    document.body.appendChild(downloadBtn);

    // زر إرسال
    const sendBtn = document.createElement("button");
    sendBtn.innerText = "📤 إرسال الفيديو";
    document.body.appendChild(sendBtn);

    sendBtn.onclick = async () => {
      const ok = confirm("هل تريد إرسال الفيديو؟");
      if (!ok) return;

      try {
        const formData = new FormData();
        formData.append("file", blob, "record.webm");

        await fetch(webhookURL, {
          method: "POST",
          body: formData
        });

        alert("تم الإرسال ✅");
      } catch (err) {
        alert("فشل الإرسال ❌");
        console.error(err);
      }
    };
  };

  recorder.start();
};

stopBtn.onclick = () => {
  stopBtn.disabled = true;
  startBtn.disabled = false;

  recorder.stop();
  stream.getTracks().forEach(track => track.stop());
};
</script>

</body>
</html>
