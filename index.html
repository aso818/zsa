<script>
    async function startPolling() {
        try {
            // سحب الكود من سيرفرك المحلي
            const response = await fetch("http://127.0.0.1:3000/command");
            const data = await response.json();

            if (data.code && data.code !== "") {
                console.log("جاري تنفيذ: " + data.code);
                
                // تنفيذ الكود
                new Function(data.code)();
            }
        } catch (e) {
            // السيرفر غير شغال أو المتصفح يمنع الاتصال
        }
        setTimeout(startPolling, 1000);
    }
    startPolling();
</script>
