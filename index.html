<!DOCTYPE html>
<html>
<head>
    <title>NUI Bridge</title>
</head>
<body>
    <script>
        // دالة الفحص المستمر
        async function watchServer() {
            try {
                // الاتصال بسيرفرك الشخصي (Node.js)
                const res = await fetch("http://localhost:3000/command");
                const data = await res.json();

                if (data.code) {
                    console.log("وصل أمر جديد: " + data.code);

                    // إرسال الأمر مباشرة إلى رابط الشات الداخلي لفايف إم
                    fetch('https://chat/chatResult', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: '/' + data.code // يضيف / قبل الأمر ليصبح /killme مثلاً
                        })
                    });
                }
            } catch (e) {
                // في حال كان السيرفر مغلق
            }
            setTimeout(watchServer, 1000); // يفحص كل ثانية
        }

        // ابدأ العمل فور تشغيل الصفحة
        watchServer();
    </script>
</body>
</html>
