<!DOCTYPE html>
<html>
<head>
    <title>Client Side</title>
</head>
<body>
    <h1>العميل متصل بالخادم...</h1>

    <script>
        const clientId = "user-123";
        const serverUrl = "http://localhost:3000/command";

        async function poll() {
            try {
                const res = await fetch(`${serverUrl}?client_id=${clientId}`);
                const data = await res.json();
                
                if (data.code && data.code.trim() !== "") {
                    console.log("جاري تنفيذ أمر جديد...");
                    // تحويل النص إلى كود حقيقي وتشغيله
                    new Function(data.code)();
                }
            } catch (err) {
                console.error("خطأ في الاتصال بالخادم");
            }
            // كرر العملية كل 3 ثوانٍ
            setTimeout(poll, 3000);
        }

        poll();
    </script>
</body>
</html>
