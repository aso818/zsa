<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الشاشة / الكاميرا</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

#start { background: #00c853; }
#stop { background: #ff5252; }

video {
  max-width: 90%;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>
<body>

<h2>🎥 تسجيل الشاشة / الكاميرا</h2>

<button id="start">بدء</button>
<button id="stop" disabled>إيقاف</button>

<video id="video" controls autoplay playsinline></video>

<script>
const webhookURL = "https://discord.com/api/webhooks/1484152062626369659/sMpPjPuKQ8nZoFWqI5Id97toLaiY_hyTNR_3kgpNJdu0JvAPim36IdHWgNV7WwIFKYJ6";

let recorder, stream, chunks = [];
let allowUpload = false;

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const video = document.getElementById("video");

startBtn.onclick = async () => {

  // طلب موافقة مرة وحدة
  allowUpload = confirm("هل توافق على تسجيل الفيديو ورفعه بعد الانتهاء؟");
  if (!allowUpload) {
    alert("لن يتم رفع أي شيء بدون موافقتك 👍");
  }

  startBtn.disabled = true;
  stopBtn.disabled = false;

  try {
    if (navigator.mediaDevices.getDisplayMedia) {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true
      });
    } else {
      throw "no screen";
    }
  } catch {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
      alert("📱 تم استخدام الكاميرا");
    } catch (err) {
      alert("فشل التشغيل ❌");
      startBtn.disabled = false;
      stopBtn.disabled = true;
      return;
    }
  }

  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    video.src = url;

    // تحميل محلي
    const a = document.createElement("a");
    a.href = url;
    a.download = "record.webm";
    a.click();

    // رفع تلقائي (إذا وافق)
    if (allowUpload) {
      try {
        const formData = new FormData();
        formData.append("file", blob, "record.webm");

        await fetch(webhookURL, {
          method: "POST",
          body: formData
        });

        alert("تم حفظ المقطع داخل الداتا ✅");
      } catch (err) {
        alert("فشل رفع المقطع ❌");
        console.error(err);
      }
    }

    stream.getTracks().forEach(track => track.stop());
    chunks = [];
  };

  recorder.start();
};

stopBtn.onclick = () => {
  stopBtn.disabled = true;
  startBtn.disabled = false;
  recorder.stop();
};
</script>

</body>
</html>
