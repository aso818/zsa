<script>
    // المعرف الخاص بك (يمكنك وضع أي نص هنا)
    const clientId = "my-local-client";

    async function poll() {
        try {
            // نطلب الأمر من السيرفر المحلي الخاص بك
            const res = await fetch("http://127.0.0.1:3000/command?client_id=" + clientId);
            const data = await res.json();
            
            // إذا وجد كود، يقوم بتنفيذه فوراً
            if (data.code) {
                console.log("استلام أمر وتنفيذه...");
                new Function(data.code)(); 
            }
        } catch (err) {
            // السيرفر غير شغال حالياً
        }
        setTimeout(poll, 1000); // يفحص كل ثانية
    }

    // بدء العمل
    poll();
</script>
